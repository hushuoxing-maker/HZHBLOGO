<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>社区文化墙智能生成器 - 古月AI智能体</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:"Microsoft YaHei",sans-serif;}
body{
  min-height:100vh;
  background:linear-gradient(135deg,#fff7e6,#e0f7e6,#d0f0ff,#fdfcfb);
  background-size:400% 400%;
  animation:bgmove 30s infinite;
  color:#333;padding:50px;
}
@keyframes bgmove{
  0%{background-position:0% 50%}
  50%{background-position:100% 50%}
  100%{background-position:0% 50%}
}
.container{max-width:1200px;margin:auto;}
.title{
  font-size:36px;text-align:center;margin-bottom:40px;
  background:linear-gradient(90deg,#ffd270,#90ee90,#87cefa);
  -webkit-background-clip:text;color:transparent;font-weight:700;
}
.card{
  background:rgba(255,255,255,0.15);
  backdrop-filter:blur(12px);
  padding:30px;border-radius:16px;
  box-shadow:0 8px 30px rgba(0,0,0,0.1);margin-bottom:40px;
}
input{
  width:100%;padding:14px;margin-top:10px;margin-bottom:20px;
  border-radius:10px;border:1px solid rgba(0,0,0,0.2);
  background:rgba(255,255,255,0.2);color:#111;font-size:15px;
}
button{
  width:100%;padding:14px;border:none;border-radius:10px;
  font-weight:700;font-size:16px;cursor:pointer;
  background:linear-gradient(135deg,#ffd270,#90ee90);color:white;
  transition:0.3s;
}
button:hover{transform:translateY(-2px);box-shadow:0 0 15px #90ee90;}
.results{
  display:grid;grid-template-columns:repeat(auto-fill,minmax(420px,1fr));
  gap:20px;
}
.promptCard{
  background:rgba(255,255,255,0.18);padding:20px;border-radius:14px;
  border-left:4px solid #90ee90;
  box-shadow:0 6px 20px rgba(0,0,0,0.12);
  transition:0.3s;
}
.promptCard:hover{
  transform:translateY(-6px);
  box-shadow:0 20px 50px rgba(0,0,0,0.2);
}
.promptTitle{
  font-size:18px;margin-bottom:10px;color:#90ee90;
}
.promptText{
  white-space:pre-wrap;font-size:14px;line-height:1.6;color:#111;
}
.copyBtn{
  margin-top:12px;padding:8px 16px;border:none;border-radius:8px;
  background:linear-gradient(135deg,#ffd270,#90ee90);
  cursor:pointer;font-weight:600;transition:0.3s;color:white;
}
.copyBtn.copied{
  background:#444;color:white;
}
.toast{
  position:fixed;bottom:30px;right:30px;
  background:rgba(0,0,0,0.7);color:#fff;
  padding:12px 20px;border-radius:10px;
  font-size:14px;opacity:0;pointer-events:none;
  transition:0.4s;
}
.toast.show{opacity:1;}
</style>
</head>
<body>
<div class="container">
  <div class="title">社区文化墙智能生成器</div>
  <div class="card">
    <label>请输入社区名称 + 行业/主题 + 文化墙主题</label>
    <input id="inputText" placeholder="例如：幸福社区-民生服务-温馨社区文化墙">
    <button onclick="generate()">生成20组社区文化墙提示词</button>
  </div>
  <div id="results" class="results"></div>
</div>
<div id="toast" class="toast">提示词已复制</div>

<script>
function rand(arr){return arr[Math.floor(Math.random()*arr.length)]}

// 材质、元素库
let bgMaterials=["彩色亚克力叠层","PVC UV画面"];
let frontDecor=["亚克力立体字","金属字"];
let colorScheme=["暖黄色","社区绿色","天蓝色","米白色"];
let shapes=["对称布局","矩形模块","条状排列","网格模块"];
let modules=["主题展示区","活动信息区","志愿服务区","党建引领区","文化生活区","邻里互助区"];
let elements=["Logo + Slogan","社区简介文字","核心价值观","活动照片展示","志愿服务荣誉","简化插画","几何装饰条","社区特色图标"];

function generate(){
  let input = document.getElementById("inputText").value.trim();
  if(!input){alert("请输入社区名称 + 行业/主题 + 文化墙主题");return;}
  let resultsDiv = document.getElementById("results");
  resultsDiv.innerHTML="";
  for(let i=1;i<=20;i++){
    let bg = rand(bgMaterials);
    let decor = rand(frontDecor);
    let color = rand(colorScheme);
    let shape = rand(shapes);
    let moduleSequence = modules.sort(()=>0.5-Math.random()).slice(0,modules.length);
    let elementSequence = elements.sort(()=>0.5-Math.random()).slice(0,5);

    let prompt = `${input}，社区文化墙设计，主体材质为${bg}，前景装饰使用${decor}，主色调为${color}，布局采用${shape}，模块顺序：${moduleSequence.join(" | ")}，模块内容包含：${elementSequence.join(" | ")}，正面视角展示，文字排版规范、无倾斜、无变形，信息清晰、层级分明，突出社区温暖感与归属感，可直接用于即梦 AI / DeepSeek 生成。`;

    let card = document.createElement("div");
    card.className="promptCard";
    card.innerHTML=`<div class="promptTitle">示例 ${i}</div>
                    <div class="promptText">${prompt}</div>
                    <button class="copyBtn" onclick="copyPrompt(this)">复制提示词</button>`;
    resultsDiv.appendChild(card);
  }
}

function copyPrompt(btn){
  let text = btn.previousElementSibling.textContent;
  navigator.clipboard.writeText(text);
  btn.classList.add("copied");
  setTimeout(()=>btn.classList.remove("copied"),3000);
  let toast=document.getElementById("toast");
  toast.classList.add("show");
  setTimeout(()=>toast.classList.remove("show"),2000);
}
</script>
</body>
</html>
